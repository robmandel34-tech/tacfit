<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Shield outline -->
  <path d="M100 20 L160 50 L160 120 Q160 160 100 180 Q40 160 40 120 L40 50 Z" 
        fill="none" 
        stroke="#22c55e" 
        stroke-width="4"/>
  
  <!-- Inner shield -->
  <path d="M100 30 L150 55 L150 115 Q150 150 100 170 Q50 150 50 115 L50 55 Z" 
        fill="#15803d" 
        stroke="#ffffff" 
        stroke-width="2"/>
  
  <!-- Mountains -->
  <polygon points="70,90 85,70 100,85 115,70 130,90 100,120" 
           fill="#ffffff"/>
  
  <!-- Orange banner background -->
  <rect x="30" y="100" width="140" height="30" 
        fill="#ea580c" 
        stroke="#ffffff" 
        stroke-width="2"/>
  
  <!-- TACFIT text -->
  <text x="100" y="120" 
        font-family="Arial, sans-serif" 
        font-size="18" 
        font-weight="bold" 
        text-anchor="middle" 
        fill="#ffffff">TACFIT</text>
  
  <!-- Wellness Competition text -->
  <text x="100" y="145" 
        font-family="Arial, sans-serif" 
        font-size="8" 
        text-anchor="middle" 
        fill="#ffffff">WELLNESS COMPETITION</text>
  
  <!-- Heartbeat line -->
  <path d="M60 155 L70 155 L75 150 L80 165 L85 145 L90 175 L95 155 L140 155" 
        stroke="#ea580c" 
        stroke-width="2" 
        fill="none"/>
</svg>