workflows:
  ios-release:
    name: TacFit iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Apple Store Connect API
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.tacfit.app
      groups:
        - stripe
      vars:
        BUNDLE_ID: "com.tacfit.app"
        XCODE_WORKSPACE: "App.xcworkspace"
        XCODE_SCHEME: "App"
        VITE_API_URL: "https://tacfit.replit.app"
      node: 20.9.0
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build frontend
        script: |
          export VITE_API_URL
          export VITE_STRIPE_PUBLIC_KEY
          STRIPE_KEY_LEN=${#VITE_STRIPE_PUBLIC_KEY}
          echo "stripe key length $STRIPE_KEY_LEN"
          echo "api url $VITE_API_URL"
          npx vite build
      - name: Patch HealthKit plugin for HRV support
        script: |
          set -e
          # The published @perfood/capacitor-healthkit has no HRV case, so the
          # strongest readiness signal (0.30 weight) can never be read. node_modules
          # is reinstalled fresh on every build, so re-apply the patch here, BEFORE
          # `pod install` compiles the plugin Swift. Idempotent.
          bash scripts/patch-healthkit-hrv.sh
      - name: Sync web assets to iOS
        script: |
          set -e
          npx cap copy ios
      - name: Ensure iOS permission usage descriptions
        script: |
          set -e
          # Guarantees Info.plist always has the camera/photo/mic/health usage
          # strings. Without NSCameraUsageDescription the app HARD-CRASHES the
          # instant the camera opens (App Store rejection 2.1(a)). This patcher
          # is idempotent and fails the build loudly if any key is missing.
          bash scripts/ios-permissions.sh
      - name: Install CocoaPods
        script: |
          set -e
          cd ios/App
          pod install
      - name: Set build number
        script: |
          BUILD_NUMBER=$(date +%s)
          agvtool new-version -all $BUILD_NUMBER
        working_directory: ios/App
      - name: Force a fresh provisioning profile with HealthKit
        script: |
          set -e
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "Clearing locally cached provisioning profiles on the build machine..."
          rm -f "$PROFILE_DIR"/*.mobileprovision 2>/dev/null || true
          mkdir -p "$PROFILE_DIR"

          echo "Looking up the Bundle ID resource for $BUNDLE_ID..."
          BUNDLE_RES_ID=$(app-store-connect bundle-ids list \
            --bundle-id-identifier "$BUNDLE_ID" --platform IOS --strict-match-identifier --json \
            | python3 -c "import sys,json; d=json.load(sys.stdin); d=d.get('data',d) if isinstance(d,dict) else d; print(d[0]['id'] if d else '')")
          if [ -z "$BUNDLE_RES_ID" ]; then
            echo "ERROR: Bundle ID $BUNDLE_ID was not found in this Apple account."
            exit 1
          fi
          echo "Bundle ID resource: $BUNDLE_RES_ID"

          echo "Looking up the existing distribution certificate(s) (none are created)..."
          CERT_IDS=$(app-store-connect certificates list \
            --type IOS_DISTRIBUTION DISTRIBUTION --json \
            | python3 -c "import sys,json; d=json.load(sys.stdin); d=d.get('data',d) if isinstance(d,dict) else d; print(' '.join(c['id'] for c in d))")
          if [ -z "$CERT_IDS" ]; then
            echo "ERROR: no distribution certificate found in the account."
            exit 1
          fi
          echo "Certificate resource(s): $CERT_IDS"

          echo "Deleting stale App Store profiles so only a fresh one remains..."
          set +e
          app-store-connect profiles list --type IOS_APP_STORE --json 2>/dev/null \
            | python3 -c "import sys,json; d=json.load(sys.stdin); d=d.get('data',d) if isinstance(d,dict) else d; [print(p.get('id','')) for p in d]" 2>/dev/null \
            | while read -r PID; do
                [ -n "$PID" ] || continue
                echo "Deleting profile $PID"
                app-store-connect profiles delete "$PID" --ignore-not-found
              done
          set -e

          echo "Creating a fresh App Store profile (inherits HealthKit from the App ID)..."
          app-store-connect profiles create "$BUNDLE_RES_ID" \
            --certificate-ids $CERT_IDS \
            --type IOS_APP_STORE \
            --name "TacFit AppStore $(date +%s)" \
            --profiles-dir "$PROFILE_DIR" \
            --save

          echo "Verifying the fresh profile includes the HealthKit entitlement..."
          FOUND_HK=0
          for DIR in "$PROFILE_DIR" "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles"; do
            for p in "$DIR"/*.mobileprovision; do
              [ -e "$p" ] || continue
              security cms -D -i "$p" > /tmp/pp.plist 2>/dev/null
              HK=$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:com.apple.developer.healthkit' /tmp/pp.plist 2>/dev/null)
              echo "  $p -> healthkit=$HK"
              [ "$HK" = "true" ] && FOUND_HK=1
            done
          done
          if [ "$FOUND_HK" != "1" ]; then
            echo "ERROR: the new provisioning profile does NOT include the HealthKit entitlement."
            echo "Confirm the HealthKit capability is enabled on App ID $BUNDLE_ID in the Apple Developer portal, then rebuild."
            exit 1
          fi
          echo "OK: HealthKit entitlement present in the fresh profile."
      - name: Debug provisioning profile entitlements
        script: |
          set +e
          echo "===== Provisioning profiles fetched by Codemagic ====="
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          ls -la "$PROFILE_DIR" 2>/dev/null || echo "(no profile dir)"
          for p in "$PROFILE_DIR"/*.mobileprovision; do
            [ -e "$p" ] || continue
            echo ""
            echo "=== FILE: $p ==="
            security cms -D -i "$p" > /tmp/pp.plist 2>/dev/null
            echo "Name:                   $(/usr/libexec/PlistBuddy -c 'Print :Name' /tmp/pp.plist 2>/dev/null)"
            echo "AppIDName:              $(/usr/libexec/PlistBuddy -c 'Print :AppIDName' /tmp/pp.plist 2>/dev/null)"
            echo "UUID:                   $(/usr/libexec/PlistBuddy -c 'Print :UUID' /tmp/pp.plist 2>/dev/null)"
            echo "application-identifier: $(/usr/libexec/PlistBuddy -c 'Print :Entitlements:application-identifier' /tmp/pp.plist 2>/dev/null)"
            echo "HealthKit entitlement:  $(/usr/libexec/PlistBuddy -c 'Print :Entitlements:com.apple.developer.healthkit' /tmp/pp.plist 2>/dev/null)"
            echo "--- Full entitlements ---"
            /usr/libexec/PlistBuddy -c 'Print :Entitlements' /tmp/pp.plist 2>/dev/null
          done
          echo "===== End provisioning profile debug ====="
      - name: Build and sign iOS app
        script: |
          xcode-project use-profiles
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath build/TacFit.xcarchive \
            archive
          xcodebuild \
            -exportArchive \
            -archivePath build/TacFit.xcarchive \
            -exportOptionsPlist /Users/builder/export_options.plist \
            -exportPath build/TacFit.ipa
        working_directory: ios/App
    artifacts:
      - ios/App/build/**/*.ipa
      - ios/App/build/**/*.dSYM.zip
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
