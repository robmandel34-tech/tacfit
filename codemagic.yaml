workflows:
  ios-release:
    name: TacFit iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Apple Store Connect API
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.tacfit.app
      groups:
        - stripe
      vars:
        BUNDLE_ID: "com.tacfit.app"
        XCODE_WORKSPACE: "App.xcworkspace"
        XCODE_SCHEME: "App"
        VITE_API_URL: "https://tacfit.replit.app"
      node: 20.9.0
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build frontend
        script: |
          export VITE_API_URL
          export VITE_STRIPE_PUBLIC_KEY
          STRIPE_KEY_LEN=${#VITE_STRIPE_PUBLIC_KEY}
          echo "stripe key length $STRIPE_KEY_LEN"
          echo "api url $VITE_API_URL"
          npx vite build
      - name: Sync web assets to iOS
        script: |
          set -e
          npx cap copy ios
      - name: Ensure iOS permission usage descriptions
        script: |
          set -e
          # Guarantees Info.plist always has the camera/photo/mic/health usage
          # strings. Without NSCameraUsageDescription the app HARD-CRASHES the
          # instant the camera opens (App Store rejection 2.1(a)). This patcher
          # is idempotent and fails the build loudly if any key is missing.
          bash scripts/ios-permissions.sh
      - name: Install CocoaPods
        script: |
          set -e
          cd ios/App
          pod install
      - name: Set build number
        script: |
          BUILD_NUMBER=$(date +%s)
          agvtool new-version -all $BUILD_NUMBER
        working_directory: ios/App
      - name: Debug provisioning profile entitlements
        script: |
          set +e
          echo "===== Provisioning profiles fetched by Codemagic ====="
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          ls -la "$PROFILE_DIR" 2>/dev/null || echo "(no profile dir)"
          for p in "$PROFILE_DIR"/*.mobileprovision; do
            [ -e "$p" ] || continue
            echo ""
            echo "=== FILE: $p ==="
            security cms -D -i "$p" > /tmp/pp.plist 2>/dev/null
            echo "Name:                   $(/usr/libexec/PlistBuddy -c 'Print :Name' /tmp/pp.plist 2>/dev/null)"
            echo "AppIDName:              $(/usr/libexec/PlistBuddy -c 'Print :AppIDName' /tmp/pp.plist 2>/dev/null)"
            echo "UUID:                   $(/usr/libexec/PlistBuddy -c 'Print :UUID' /tmp/pp.plist 2>/dev/null)"
            echo "application-identifier: $(/usr/libexec/PlistBuddy -c 'Print :Entitlements:application-identifier' /tmp/pp.plist 2>/dev/null)"
            echo "HealthKit entitlement:  $(/usr/libexec/PlistBuddy -c 'Print :Entitlements:com.apple.developer.healthkit' /tmp/pp.plist 2>/dev/null)"
            echo "--- Full entitlements ---"
            /usr/libexec/PlistBuddy -c 'Print :Entitlements' /tmp/pp.plist 2>/dev/null
          done
          echo "===== End provisioning profile debug ====="
      - name: Build and sign iOS app
        script: |
          xcode-project use-profiles
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath build/TacFit.xcarchive \
            archive
          xcodebuild \
            -exportArchive \
            -archivePath build/TacFit.xcarchive \
            -exportOptionsPlist /Users/builder/export_options.plist \
            -exportPath build/TacFit.ipa
        working_directory: ios/App
    artifacts:
      - ios/App/build/**/*.ipa
      - ios/App/build/**/*.dSYM.zip
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
