<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background-color: #0a0f0a;
    display: flex;
    align-items: center;
    justify-content: center;
    position: fixed;
    inset: 0;
  }

  .phone-frame {
    width: 310px;
    height: 634px;
    background: #1c1c1e;
    border-radius: 50px;
    padding: 9px;
    box-shadow:
      0 0 0 1.5px #3a3a3a,
      0 0 0 3px #111111,
      0 40px 100px rgba(0,0,0,0.95),
      inset 0 0 0 1px rgba(255,255,255,0.07);
    position: relative;
  }

  /* volume buttons left */
  .phone-frame::before {
    content: '';
    position: absolute;
    left: -3px;
    top: 110px;
    width: 3px;
    height: 32px;
    background: #2e2e2e;
    border-radius: 3px 0 0 3px;
    box-shadow: 0 46px 0 #2e2e2e, 0 86px 0 #2e2e2e;
  }

  /* power button right */
  .phone-frame::after {
    content: '';
    position: absolute;
    right: -3px;
    top: 136px;
    width: 3px;
    height: 60px;
    background: #2e2e2e;
    border-radius: 0 3px 3px 0;
  }

  .phone-screen {
    width: 100%;
    height: 100%;
    border-radius: 43px;
    overflow: hidden;
    background: #000;
    position: relative;
  }

  .dynamic-island {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: 88px;
    height: 24px;
    background: #000;
    border-radius: 16px;
    z-index: 10;
  }

  .phone-screen img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
    display: block;
  }
</style>
</head>
<body>
  <div class="phone-frame">
    <div class="phone-screen">
      <div class="dynamic-island"></div>
      <img src="/team-screen.png" alt="TacFit Team Screen" />
    </div>
  </div>
</body>
</html>
