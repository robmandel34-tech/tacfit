<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #0a0f0a;
    background-image:
      radial-gradient(ellipse 90% 70% at 50% -10%, rgba(42, 90, 30, 0.65) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 50% 110%, rgba(20, 55, 15, 0.45) 0%, transparent 60%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    position: relative;
  }

  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(74, 138, 58, 0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(74, 138, 58, 0.035) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }

  .layout {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 80px;
    z-index: 1;
    padding: 40px;
  }

  /* LEFT: text */
  .text-col {
    display: flex;
    flex-direction: column;
    gap: 0;
    max-width: 480px;
  }

  .eyebrow {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #5db84a;
    margin-bottom: 20px;
  }

  .headline {
    font-size: 72px;
    font-weight: 800;
    color: #ffffff;
    letter-spacing: -2px;
    line-height: 1.0;
    text-shadow: 0 4px 40px rgba(0,0,0,0.5);
  }

  .headline span {
    color: #5db84a;
  }

  .subline {
    margin-top: 24px;
    font-size: 22px;
    font-weight: 400;
    color: rgba(255,255,255,0.5);
    line-height: 1.5;
  }

  .divider {
    width: 56px;
    height: 3px;
    background: linear-gradient(90deg, #5db84a, transparent);
    margin: 32px 0;
    border-radius: 2px;
  }

  .features {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .feat {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 17px;
    color: rgba(255,255,255,0.75);
  }

  .feat-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #5db84a;
    flex-shrink: 0;
    box-shadow: 0 0 8px rgba(93,184,74,0.6);
  }

  .brand-row {
    margin-top: 48px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .brand-name {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 5px;
    color: #5db84a;
    text-transform: uppercase;
  }

  /* RIGHT: phone */
  .phone-wrap {
    position: relative;
    flex-shrink: 0;
  }

  .phone-glow {
    position: absolute;
    inset: -40px;
    border-radius: 100px;
    background: radial-gradient(ellipse at center, rgba(74,138,58,0.20) 0%, transparent 70%);
    pointer-events: none;
  }

  .phone-frame {
    width: 310px;
    height: 640px;
    background: #1a1a1a;
    border-radius: 52px;
    padding: 10px;
    box-shadow:
      0 0 0 1.5px #3a3a3a,
      0 0 0 3px #111,
      0 40px 100px rgba(0,0,0,0.9),
      0 0 60px rgba(74, 138, 58, 0.15),
      inset 0 0 0 1px rgba(255,255,255,0.06);
    position: relative;
  }

  .phone-frame::before {
    content: '';
    position: absolute;
    left: -3px;
    top: 120px;
    width: 3px;
    height: 36px;
    background: #2a2a2a;
    border-radius: 3px 0 0 3px;
    box-shadow: 0 52px 0 #2a2a2a, 0 96px 0 #2a2a2a;
  }

  .phone-frame::after {
    content: '';
    position: absolute;
    right: -3px;
    top: 148px;
    width: 3px;
    height: 64px;
    background: #2a2a2a;
    border-radius: 0 3px 3px 0;
  }

  .phone-screen {
    width: 100%;
    height: 100%;
    border-radius: 44px;
    overflow: hidden;
    background: #0d1117;
    position: relative;
  }

  .dynamic-island {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: 90px;
    height: 24px;
    background: #000;
    border-radius: 16px;
    z-index: 10;
  }

  .phone-screen img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
    display: block;
  }
</style>
</head>
<body>
  <div class="layout">
    <!-- Left text column -->
    <div class="text-col">
      <div class="eyebrow">TacFit &nbsp;·&nbsp; Team Mode</div>
      <div class="headline">RALLY<br>YOUR<br><span>TEAM.</span></div>
      <p class="subline">Compete together.<br>Track every mission.<br>Win as one.</p>
      <div class="divider"></div>
      <div class="features">
        <div class="feat"><div class="feat-dot"></div>Real-time team leaderboards</div>
        <div class="feat"><div class="feat-dot"></div>Activity tracking with evidence</div>
        <div class="feat"><div class="feat-dot"></div>Team chat &amp; mission planning</div>
        <div class="feat"><div class="feat-dot"></div>Compete in free &amp; paid events</div>
      </div>
      <div class="brand-row">
        <div class="brand-name">TacFit</div>
      </div>
    </div>

    <!-- Right phone column -->
    <div class="phone-wrap">
      <div class="phone-glow"></div>
      <div class="phone-frame">
        <div class="phone-screen">
          <div class="dynamic-island"></div>
          <img src="/team-screen.png" alt="TacFit Team Screen" />
        </div>
      </div>
    </div>
  </div>
</body>
</html>
