<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .terrain { fill: #8FBC8F; }
      .water { fill: #4682B4; }
      .road { stroke: #D3D3D3; stroke-width: 3; fill: none; }
      .route { stroke: #4CAF50; stroke-width: 6; fill: none; stroke-linecap: round; }
      .marker-start { fill: #4CAF50; }
      .marker-end { fill: #ff4444; }
      .text { font-family: Arial, sans-serif; font-size: 14px; fill: #333; font-weight: bold; }
      .title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #333; }
      .stats { font-family: Arial, sans-serif; font-size: 12px; fill: #666; }
    </style>
    
    <!-- Terrain pattern -->
    <pattern id="terrain" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="#90EE90"/>
      <circle cx="5" cy="5" r="1" fill="#228B22" opacity="0.3"/>
      <circle cx="15" cy="15" r="1" fill="#228B22" opacity="0.3"/>
      <circle cx="10" cy="12" r="0.5" fill="#228B22" opacity="0.4"/>
    </pattern>
    
    <!-- Water pattern -->
    <pattern id="water" width="15" height="15" patternUnits="userSpaceOnUse">
      <rect width="15" height="15" fill="#87CEEB"/>
      <path d="M0,7 Q7,3 15,7 Q7,11 0,7" fill="#4682B4" opacity="0.4"/>
    </pattern>
  </defs>
  
  <!-- Background terrain -->
  <rect width="800" height="600" fill="url(#terrain)"/>
  
  <!-- Water bodies -->
  <ellipse cx="200" cy="150" rx="80" ry="40" fill="url(#water)"/>
  <ellipse cx="600" cy="400" rx="60" ry="30" fill="url(#water)"/>
  
  <!-- Roads -->
  <path d="M 50 350 Q 200 330 400 340 Q 600 350 750 360" class="road"/>
  <path d="M 100 100 Q 300 200 500 150 Q 700 100 800 120" class="road"/>
  
  <!-- Elevation contours -->
  <ellipse cx="400" cy="300" rx="150" ry="100" fill="none" stroke="#8B4513" stroke-width="1" opacity="0.6"/>
  <ellipse cx="400" cy="300" rx="120" ry="80" fill="none" stroke="#8B4513" stroke-width="1" opacity="0.4"/>
  <ellipse cx="400" cy="300" rx="90" ry="60" fill="none" stroke="#8B4513" stroke-width="1" opacity="0.3"/>
  
  <!-- GPS Route path -->
  <path d="M 120 280 Q 180 260 240 290 Q 320 340 400 320 Q 480 300 560 330 Q 620 350 680 340" class="route"/>
  
  <!-- Route markers with shadows -->
  <circle cx="120" cy="280" r="12" fill="#000" opacity="0.3" transform="translate(2,2)"/>
  <circle cx="120" cy="280" r="10" class="marker-start"/>
  <text x="120" y="260" text-anchor="middle" class="text">START</text>
  
  <circle cx="680" cy="340" r="12" fill="#000" opacity="0.3" transform="translate(2,2)"/>
  <circle cx="680" cy="340" r="10" class="marker-end"/>
  <text x="680" y="320" text-anchor="middle" class="text">FINISH</text>
  
  <!-- Waypoint markers -->
  <circle cx="320" cy="340" r="4" fill="#FFD700"/>
  <circle cx="560" cy="330" r="4" fill="#FFD700"/>
  
  <!-- Title and info panel -->
  <rect x="20" y="20" width="300" height="120" fill="#fff" stroke="#333" stroke-width="2" rx="10" opacity="0.95"/>
  <text x="40" y="45" class="title">GPS Route Map</text>
  <text x="40" y="70" class="text">Running Workout</text>
  <text x="40" y="90" class="stats">Distance: 5.2 km</text>
  <text x="40" y="105" class="stats">Elevation Gain: 45m</text>
  <text x="40" y="120" class="stats">Duration: 35 minutes</text>
  
  <!-- Compass -->
  <g transform="translate(720, 80)">
    <circle cx="0" cy="0" r="30" fill="#fff" stroke="#333" stroke-width="2" opacity="0.9"/>
    <path d="M 0,-20 L 5,0 L 0,20 L -5,0 Z" fill="#4CAF50"/>
    <text x="0" y="-35" text-anchor="middle" class="stats">N</text>
  </g>
  
  <!-- Scale bar -->
  <g transform="translate(650, 550)">
    <text x="0" y="0" class="stats">0</text>
    <line x1="10" y1="5" x2="110" y2="5" stroke="#333" stroke-width="2"/>
    <line x1="10" y1="0" x2="10" y2="10" stroke="#333" stroke-width="2"/>
    <line x1="110" y1="0" x2="110" y2="10" stroke="#333" stroke-width="2"/>
    <text x="115" y="0" class="stats">1 km</text>
  </g>
  
  <!-- TacFit branding -->
  <text x="20" y="580" class="stats" opacity="0.7">TacFit GPS Route Tracking • Generated from HealthKit</text>
</svg>